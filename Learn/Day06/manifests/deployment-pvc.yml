apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pvc
  namespace: k8s-day06
  labels:
    app: nginx-pvc
    day: "06"
  annotations:
    kubernetes.io/change-cause: "day-06 deployment with persistent volume"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-pvc
  template:
    metadata:
      labels:
        app: nginx-pvc
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "128Mi"
          volumeMounts:
            - name: nginx-storage
              mountPath: /usr/share/nginx/html
      volumes:
        - name: nginx-storage
          persistentVolumeClaim:
            claimName: nginx-pvc
