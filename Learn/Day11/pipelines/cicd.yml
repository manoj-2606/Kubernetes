trigger:
  branches:
    include:
      - main
  paths:
    include:
      - Day11/**

pool:
  vmImage: ubuntu-latest

variables:
  ACR_NAME: acrakslearning
  IMAGE_NAME: my-app
  HELM_CHART_PATH: Day11/helm/my-app
  NAMESPACE: day11
  RELEASE_NAME: my-app
  RESOURCE_GROUP: rg-aks-learning
  CLUSTER_NAME: aks-learning

stages:
  - stage: Build
    displayName: Build and Push Docker Image
    jobs:
      - job: BuildImage
        displayName: Build Image and Push to ACR
        steps:
          - task: AzureCLI@2
            displayName: Build and Push to ACR
            inputs:
              azureSubscription: azure-service-connection-aks
              scriptType: bash
              scriptLocation: inlineScript
              inlineScript: |
                az acr login --name $(ACR_NAME)

                docker build \
                  -t $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId) \
                  -t $(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest \
                  Day11/app/

                docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)
                docker push $(ACR_NAME).azurecr.io/$(IMAGE_NAME):latest

                echo "Image pushed: $(ACR_NAME).azurecr.io/$(IMAGE_NAME):$(Build.BuildId)"

  - stage: Deploy
    displayName: Deploy to AKS via Helm
    dependsOn: Build
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: HelmDeploy
        displayName: Helm Upgrade Install
        environment: aks-learning
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: self

                - task: AzureCLI@2
                  displayName: Configure kubectl
                  inputs:
                    azureSubscription: azure-service-connection-aks
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(RESOURCE_GROUP) \
                        --name $(CLUSTER_NAME) \
                        --overwrite-existing

                      kubectl get nodes

                - task: AzureCLI@2
                  displayName: Helm Upgrade Install
                  inputs:
                    azureSubscription: azure-service-connection-aks
                    scriptType: bash
                    scriptLocation: inlineScript
                    inlineScript: |
                      az aks get-credentials \
                        --resource-group $(RESOURCE_GROUP) \
                        --name $(CLUSTER_NAME) \
                        --overwrite-existing

                      kubectl apply -f Day11/manifests/namespace.yml

                      helm upgrade --install $(RELEASE_NAME) $(HELM_CHART_PATH) \
                        --namespace $(NAMESPACE) \
                        --set image.repository=$(ACR_NAME).azurecr.io/$(IMAGE_NAME) \
                        --set image.tag=$(Build.BuildId) \
                        --atomic \
                        --timeout 5m \
                        --wait

                      echo "Deployment complete"
                      helm list -n $(NAMESPACE)
                      kubectl get pods -n $(NAMESPACE)
