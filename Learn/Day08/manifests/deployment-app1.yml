apiVersion: apps/v1
kind: Deployment
metadata:
  name: app1
  namespace: k8s-day08
  labels:
    app: app1
    day: "08"
  annotations:
    kubernetes.io/change-cause: "day-08 app1 for ingress routing"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: app1
  template:
    metadata:
      labels:
        app: app1
    spec:
      containers:
        - name: nginx
          image: nginx:stable
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
---
apiVersion: v1
kind: Service
metadata:
  name: app1-service
  namespace: k8s-day08
spec:
  selector:
    app: app1
  ports:
    - port: 80
      targetPort: 80
